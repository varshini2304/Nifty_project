# docker-compose.yml
version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: nichisoft_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: nichinsoft_db
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD}
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo-init:/docker-entrypoint-initdb.d:ro
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nichisoft_backend
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://nichin_app:${MONGO_APP_PASSWORD}@mongo:27017/nichinsoft_db
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 60m
      NICHIN_USERNAME: ${NICHIN_USERNAME}
      NICHIN_PASSWORD_HASH: ${NICHIN_PASSWORD_HASH}
      BATCH_API_KEY: ${BATCH_API_KEY}
      PORT: 5000
      CORS_ORIGIN: http://localhost:3000
      NODE_ENV: development
      LOG_DIR: /app/logs
    ports:
      - "5000:5000"
    volumes:
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: http://localhost:5000/api/v1
    container_name: nichisoft_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:80"

  batch:
    build:
      context: ./batch
      dockerfile: Dockerfile
    container_name: nichisoft_batch
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      API_URL: http://backend:5000/api/v1
      BATCH_API_KEY: ${BATCH_API_KEY}
      LOG_DIR: /app/logs
      NODE_ENV: development
      TZ: Asia/Kolkata
    volumes:
      - batch_logs:/app/logs

volumes:
  mongo_data:
  backend_logs:
  batch_logs:
